version: "3.7"

services:
  app_proxy:
    environment:
      # Format: <app-id>_<service-name>_1
      APP_HOST: cups-server-cups_server_1
      APP_PORT: 631

  server:
    image: anujdatar/cups:latest
    restart: on-failure
    # Privileged + /dev mount lets CUPS see USB printers connected to the host.
    # This avoids install failures on hosts where /dev/bus/usb doesn't exist yet
    # (a hardcoded `devices:` path aborts container creation if it's missing).
    privileged: true
    ports:
      - "631:631"
    environment:
      CUPSADMIN: admin
      CUPSPASSWORD: password
      TZ: Asia/Kolkata
    volumes:
      # Persist CUPS configuration and added printers across restarts
      - ${APP_DATA_DIR}/data/cups:/etc/cups
      # Access USB printers connected to the host
      - /dev/bus/usb:/dev/bus/usb
